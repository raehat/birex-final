<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#070a10"/>
  <!-- Rounded diamond outline -->
  <path d="M 45,25 Q 50,20 55,25 L 75,45 Q 80,50 75,55 L 55,75 Q 50,80 45,75 L 25,55 Q 20,50 25,45 Z"
        fill="#060e0a"
        stroke="#00ff88"
        stroke-width="4.5"
        stroke-linejoin="round"/>
  <!-- Vertical center line -->
  <line x1="50" y1="20" x2="50" y2="80"
        stroke="#0d2218" stroke-width="2.5"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="8" fill="#00ff88"/>
</svg>
